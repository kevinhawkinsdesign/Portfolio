<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 40" fill="none">
  <!-- Open book icon -->
  <rect x="1" y="7" width="16" height="26" rx="3" fill="#1a1a2e"/>
  <rect x="19" y="7" width="16" height="26" rx="3" fill="#1a1a2e"/>
  <rect x="8" y="7" width="2" height="26" fill="#e8703a"/>
  <rect x="26" y="7" width="2" height="26" fill="#e8703a"/>
  <!-- Pages lines -->
  <line x1="4" y1="14" x2="9" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="18" x2="9" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="22" x2="9" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="14" x2="32" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="18" x2="32" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="22" x2="32" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
