<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#060c14"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00c896" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <rect width="800" height="600" fill="url(#glow5)"/>
  <!-- Phone -->
  <rect x="230" y="20" width="260" height="560" rx="36" fill="#0d1a26" stroke="#1e2e3e" stroke-width="2"/>
  <rect x="236" y="26" width="248" height="548" rx="32" fill="#080e18"/>
  <rect x="308" y="26" width="80" height="22" rx="11" fill="#0d1a26"/>
  <!-- Charging in progress screen -->
  <rect x="244" y="58" width="232" height="516" rx="28" fill="#080e18"/>
  <!-- Status text -->
  <rect x="270" y="80" width="132" height="14" rx="3" fill="#00c896" opacity="0.9"/>
  <rect x="290" y="100" width="88" height="8" rx="2" fill="#ffffff" opacity="0.35"/>
  <!-- Circular progress -->
  <circle cx="356" cy="210" r="80" fill="none" stroke="#0d1a26" stroke-width="12"/>
  <circle cx="356" cy="210" r="80" fill="none" stroke="#00c896" stroke-width="12" stroke-dasharray="360 140" stroke-linecap="round" transform="rotate(-90 356 210)"/>
  <circle cx="356" cy="210" r="60" fill="#0a1520"/>
  <text x="356" y="202" text-anchor="middle" fill="#00c896" font-size="28" font-family="monospace" font-weight="bold">73%</text>
  <rect x="310" y="212" width="92" height="10" rx="2" fill="#ffffff" opacity="0.35"/>
  <!-- Stats row -->
  <rect x="252" y="310" width="228" height="80" rx="10" fill="#0d1a26"/>
  <rect x="264" y="324" width="60" height="8" rx="2" fill="#ffffff" opacity="0.35"/>
  <text x="268" y="365" fill="#00c896" font-size="18" font-family="monospace" font-weight="bold">24.3</text>
  <rect x="264" y="372" width="50" height="6" rx="2" fill="#ffffff" opacity="0.25"/>
  <rect x="340" y="316" width="1" height="50" fill="#ffffff" opacity="0.08"/>
  <rect x="354" y="324" width="60" height="8" rx="2" fill="#ffffff" opacity="0.35"/>
  <text x="358" y="365" fill="#7aabdc" font-size="18" font-family="monospace" font-weight="bold">1h 42m</text>
  <rect x="354" y="372" width="50" height="6" rx="2" fill="#ffffff" opacity="0.25"/>
  <!-- Smart charge indicator -->
  <rect x="252" y="402" width="228" height="50" rx="8" fill="#0a1a10"/>
  <rect x="252" y="402" width="228" height="4" rx="2" fill="#00c896" opacity="0.6"/>
  <rect x="264" y="414" width="120" height="10" rx="2" fill="#00c896" opacity="0.8"/>
  <rect x="264" y="428" width="180" height="8" rx="2" fill="#ffffff" opacity="0.3"/>
  <!-- Stop button -->
  <rect x="272" y="466" width="168" height="44" rx="22" fill="#0d1a26" stroke="#1e2e3e" stroke-width="1.5"/>
  <rect x="296" y="481" width="120" height="14" rx="3" fill="#ffffff" opacity="0.5"/>
  <!-- Price -->
  <rect x="272" y="520" width="168" height="32" rx="8" fill="#0a1a10"/>
  <text x="356" y="541" text-anchor="middle" fill="#00c896" font-size="16" font-family="monospace" font-weight="bold">€3.42</text>
</svg>